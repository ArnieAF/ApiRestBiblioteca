spring.application.name=api-biblioteca
server.servlet.context-path=/arni/api-biblioteca
springdoc.swagger-ui.path=/swagger-ui.html

spring.profiles.active=dev

# Estrategia de nombres (no modifica nombres de columnas)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# JWT (la clave real se sobreescribe por variable de entorno en producciˇn)
jwt.expiration=86400000